<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome to Notes</h2>
      <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">Collaborate in real-time</p>
      
      <!-- Normal Auth Form -->
      <form id="auth-form">
        <div class="input-group" id="name-group" style="display: none;">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="John Doe">
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
      </form>
      
      <p style="margin-top: 1rem; font-size: 0.875rem;">
        <a href="#" id="toggle-auth" style="color: var(--primary-color); text-decoration: none;">Need an account? Register</a>
      </p>

      <div class="divider"><span>OR</span></div>
      
      <!-- Google Auth Button -->
      <a href="#" id="google-auth-btn" class="btn-google">
        <img src="https://img.icons8.com/color/16/000000/google-logo.png" alt="Google">
        Sign in with Google
      </a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
